<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birhat'ın Mekanı - Apex İmparatorluğu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-container">
        <div class="auth-card">
            <h1 class="logo">BİRHAT'IN MEKANI</h1>
            <div class="auth-tabs">
                <button id="login-tab-btn" class="active" onclick="authTab('login')">Giriş</button>
                <button id="register-tab-btn" onclick="authTab('register')">Kayıt</button>
            </div>
            
            <div id="login-form" class="auth-form">
                <input type="text" id="l-user" placeholder="Kullanıcı Adı">
                <input type="password" id="l-pass" placeholder="Şifre">
                <button onclick="girisYap()" class="btn-main">MEKANA GİR</button>
            </div>

            <div id="register-form" class="auth-form" style="display:none;">
                <input type="text" id="r-user" placeholder="Yeni Kullanıcı Adı">
                <input type="password" id="r-pass" placeholder="Şifre (Min 6 Karakter)">
                <button onclick="kayitOl()" class="btn-main" style="background: #27ae60;">HESAP AÇ</button>
            </div>
        </div>
    </div>

    <div id="game-section" style="display:none;">
        
        <header class="game-header">
            <div class="header-top">
                <div class="player-info">
                    <div class="avatar" onclick="cikisYap()">B</div> <div class="xp-details">
                        <span id="display-user">Yükleniyor...</span>
                        <div class="xp-bar-bg"><div id="xp-fill"></div></div>
                        <small>Seviye <span id="u-level">1</span></small>
                    </div>
                </div>
                <div class="currency-group">
                    <div class="c-box">🪙 <span id="balance">0</span></div>
                    <div class="c-box crystal">💎 <span id="crystal">0</span></div>
                </div>
            </div>
        </header>

        <div id="category-bar" class="category-nav">
            <button onclick="displayMarket('dukkan')" class="cat-btn active">🏪 Dükkan</button>
            <button onclick="displayMarket('ciftlik')" class="cat-btn">🚜 Çiftlik</button>
            <button onclick="displayMarket('fabrika')" class="cat-btn">🏭 Fabrika</button>
            <button onclick="displayMarket('maden')" class="cat-btn">💎 Maden</button>
        </div>

        <main class="main-content">
            <div id="pane-shops" class="pane active">
                <div id="property-list">
                    </div>
            </div>

            <div id="pane-markalar" class="pane" style="display:none;">
                <h2 class="pane-title">Global Markaların</h2>
                <div id="brand-list">
                    </div>
            </div>

            <div id="pane-crypto" class="pane" style="display:none;">
                <h2 class="pane-title">Apex Borsası</h2>
                <div class="crypto-card">
                    <div class="c-info"><strong>Xenon Coin (XEN)</strong> <span id="xen-price">3.85 ₺</span></div>
                    <div class="c-btns">
                        <button class="buy">AL</button>
                        <button class="sell">SAT</button>
                    </div>
                </div>
            </div>

            <div id="pane-chat" class="pane" style="display:none;">
                <div id="chat-display"></div>
                <div class="chat-input-row">
                    <input type="text" id="chat-msg" placeholder="Mesajını yaz...">
                    <button onclick="mesajGonder()">🚀</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button onclick="switchPane('shops')" class="nav-item">🏠 Mekanlar</button>
            <button onclick="switchPane('markalar')" class="nav-item">🚀 Markalar</button>
            <button onclick="switchPane('crypto')" class="nav-item">📈 Borsa</button>
            <button onclick="switchPane('chat')" class="nav-item">💬 Sohbet</button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
