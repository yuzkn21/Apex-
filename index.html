<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birhat'ın Mekanı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 class="game-title">BİRHAT'IN MEKANI</h1>
            <p class="auth-subtitle">Ticaret İmparatorluğunu Kur</p>
            
            <div class="auth-tabs">
                <button id="tab-login" class="active-tab" onclick="switchTab('login')">Giriş Yap</button>
                <button id="tab-register" onclick="switchTab('register')">Kayıt Ol</button>
            </div>

            <div id="form-login" class="form-section">
                <input type="text" id="login-username" placeholder="Kullanıcı Adı">
                <input type="password" id="login-password" placeholder="Şifre">
                <button class="action-btn" onclick="login()">OYUNA GİR</button>
            </div>

            <div id="form-register" class="form-section" style="display: none;">
                <input type="text" id="reg-username" placeholder="Benzersiz Kullanıcı Adı">
                <input type="password" id="reg-password" placeholder="Şifre (En az 6 karakter)">
                <select id="reg-city">
                    <option value="" disabled selected>Şehrini Seç</option>
                    <option value="Diyarbakır">Diyarbakır</option>
                    <option value="İstanbul">İstanbul</option>
                    <option value="Ankara">Ankara</option>
                    <option value="İzmir">İzmir</option>
                </select>
                <button class="action-btn success-btn" onclick="register()">HESAP OLUŞTUR</button>
            </div>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        
        <header class="top-header">
            <div class="profile-section" onclick="toggleProfileModal()">
                <div class="avatar-circle">B</div>
                <div class="user-stats">
                    <span id="ui-username" class="username-text">Oyuncu</span>
                    <div class="xp-bar-container">
                        <div id="ui-xp-fill" class="xp-fill"></div>
                    </div>
                    <span class="level-text">Seviye: <span id="ui-level">1</span></span>
                </div>
            </div>
            <div class="economy-section">
                <div class="currency-item coin">
                    <span>🪙</span> <span id="ui-balance">0</span>
                </div>
                <div class="currency-item diamond">
                    <span>💎</span> <span id="ui-crystal">0</span>
                </div>
            </div>
        </header>

        <main class="game-content" id="market-list">
            </main>

        <nav class="bottom-navigation">
            <div class="nav-item" id="nav-dukkan" onclick="loadCategory('dukkan')">
                <div class="nav-icon">🏪</div>
                <span class="nav-label">Dükkanlar</span>
            </div>
            <div class="nav-item" id="nav-bahce" onclick="loadCategory('bahce')">
                <div class="nav-icon">🌿</div>
                <span class="nav-label">Bahçeler</span>
            </div>
            <div class="nav-item" id="nav-ciftlik" onclick="loadCategory('ciftlik')">
                <div class="nav-icon">🥚</div>
                <span class="nav-label">Çiftlikler</span>
            </div>
            <div class="nav-item" id="nav-fabrika" onclick="loadCategory('fabrika')">
                <div class="nav-icon">🏭</div>
                <span class="nav-label">Fabrikalar</span>
            </div>
            <div class="nav-item" id="nav-maden" onclick="loadCategory('maden')">
                <div class="nav-icon">🏗️</div>
                <span class="nav-label">Madenler</span>
            </div>
            <div class="nav-item" id="nav-marka" onclick="loadCategory('marka')">
                <div class="nav-icon">🏢</div>
                <span class="nav-label">Marka</span>
            </div>
        </nav>
    </div>

    <div id="profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <button class="close-btn" onclick="toggleProfileModal()">✕</button>
            <div class="modal-avatar">B</div>
            <h2 id="modal-username">Oyuncu</h2>
            <div class="modal-city" id="modal-city">Şehir</div>
            
            <div class="modal-stats-grid">
                <div class="stat-box">
                    <span class="stat-title">Toplam Apex</span>
                    <span class="stat-value" id="modal-total-apex">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-title">Sahip Olunan Mülk</span>
                    <span class="stat-value" id="modal-property-count">0</span>
                </div>
            </div>
            
            <button class="action-btn logout-btn" onclick="logout()">GÜVENLİ ÇIKIŞ YAP</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
