<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birhat'ın Mekanı</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-container">
        <div class="auth-card">
            <h1 class="logo">BİRHAT'IN MEKANI</h1>
            <div class="auth-tabs">
                <button id="login-tab-btn" class="active" onclick="authTab('login')">Giriş</button>
                <button id="register-tab-btn" onclick="authTab('register')">Kayıt</button>
            </div>
            <div id="login-form" class="auth-form">
                <input type="text" id="l-user" placeholder="Kullanıcı Adı">
                <input type="password" id="l-pass" placeholder="Şifre">
                <button onclick="girisYap()" class="btn-main">BAŞLA</button>
            </div>
            <div id="register-form" class="auth-form" style="display:none;">
                <input type="text" id="r-user" placeholder="Kullanıcı Adı">
                <input type="password" id="r-pass" placeholder="Şifre (Min 6)">
                <select id="r-city" class="auth-input">
                    <option value="Diyarbakır">Diyarbakır</option>
                    <option value="Ankara">Ankara</option>
                    <option value="İstanbul">İstanbul</option>
                    <option value="İzmir">İzmir</option>
                </select>
                <button onclick="kayitOl()" class="btn-main" style="background: #27ae60;">KAYIT OL</button>
            </div>
        </div>
    </div>

    <div id="game-section" style="display:none;">
        <header class="top-bar">
            <div class="user-main" onclick="toggleProfile()">
                <div class="p-frame"><img src="https://via.placeholder.com/50" id="user-img"></div>
                <div class="xp-info">
                    <span id="display-user">Birhat</span>
                    <div class="xp-progress"><div id="xp-fill"></div></div>
                    <small>Seviye: <span id="u-level">1</span></small>
                </div>
            </div>
            <div class="stats-main">
                <div class="stat-box">🪙 <span id="balance">0</span></div>
                <div class="stat-box" style="color: #00d2ff;">💎 <span id="crystal">0</span></div>
            </div>
        </header>

        <main class="game-content">
            <div id="property-list"></div>
        </main>

        <nav class="bottom-bar">
            <div class="nav-item" onclick="displayMarket('dukkan')"><span>🏪</span><small>Dükkanlar</small></div>
            <div class="nav-item" onclick="displayMarket('bahce')"><span>🌿</span><small>Bahçeler</small></div>
            <div class="nav-item" onclick="displayMarket('ciftlik')"><span>🥚</span><small>Çiftlikler</small></div>
            <div class="nav-item" onclick="displayMarket('fabrika')"><span>🏭</span><small>Fabrikalar</small></div>
            <div class="nav-item" onclick="displayMarket('maden')"><span>🏗️</span><small>Madenler</small></div>
            <div class="nav-item highlight" onclick="displayMarket('marka')"><span>🏢</span><small>Marka</small></div>
        </nav>
    </div>

    <div id="profile-modal" class="modal-overlay" style="display:none;">
        <div class="profile-card">
            <button class="close-btn" onclick="toggleProfile()">×</button>
            <div class="big-avatar">B</div>
            <h2 id="p-name">Birhat</h2>
            <span id="p-city" class="city-badge">Diyarbakır</span>
            <div class="profile-stats">
                <div class="p-stat"><small>Ünvan</small><p id="p-rank">Çırak</p></div>
                <div class="p-stat"><small>Servet</small><p id="p-wealth">0</p></div>
            </div>
            <button onclick="gunlukOdulAl()" class="btn-daily">🎁 Günlük Ödül</button>
            <button onclick="cikisYap()" class="btn-logout">Güvenli Çıkış</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
        </html>
        
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birhat'ın Mekanı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="profile-info" onclick="toggleProfile()">
            <div class="avatar-circle">B</div>
            <div class="xp-group">
                <span id="display-user">Birhat</span>
                <div class="xp-bg"><div id="xp-fill"></div></div>
                <small>Lvl: <span id="u-level">1</span></small>
            </div>
        </div>
        <div class="money-group">
            <div class="econ-item">🪙 <span id="balance">2500</span></div>
            <div class="econ-item" style="color: #00d2ff;">💎 <span id="crystal">0</span></div>
        </div>
    </header>

    <main class="game-content" id="property-list">
        </main>

    <nav class="bottom-nav">
        <div class="nav-btn" onclick="displayMarket('dukkan')">
            <span>🏪</span><p>Dükkanlar</p>
        </div>
        <div class="nav-btn" onclick="displayMarket('bahce')">
            <span>🌿</span><p>Bahçeler</p>
        </div>
        <div class="nav-btn" onclick="displayMarket('ciftlik')">
            <span>🥚</span><p>Çiftlikler</p>
        </div>
        <div class="nav-btn" onclick="displayMarket('fabrika')">
            <span>🏭</span><p>Fabrikalar</p>
        </div>
        <div class="nav-btn" onclick="displayMarket('maden')">
            <span>🏗️</span><p>Madenler</p>
        </div>
        <div class="nav-btn highlight" onclick="displayMarket('marka')">
            <span class="yellow-icon">🏢</span><p class="yellow-text">Marka</p>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
