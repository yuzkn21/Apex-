<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birhat'ın Mekanı - Apex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Birhat'ın Mekanı</h1>
        
        <div id="auth-container">
    <div class="auth-tabs">
        <button id="login-tab-btn" class="active" onclick="authTabDegistir('login')">Giriş Yap</button>
        <button id="register-tab-btn" onclick="authTabDegistir('register')">Kayıt Ol</button>
    </div>

    <div id="login-form" class="auth-form">
        <input type="text" id="login-username" placeholder="Kullanıcı Adı">
        <input type="password" id="login-password" placeholder="Şifre">
        <button onclick="girisYap()">Giriş Yap</button>
    </div>

    <div id="register-form" class="auth-form" style="display:none;">
        <input type="text" id="reg-username" placeholder="Yeni Kullanıcı Adı">
        <input type="password" id="reg-password" placeholder="Şifre (Min 6 Karakter)">
        <button onclick="kayitOl()">Hesap Oluştur</button>
    </div>
    <p id="message"></p>
        </div>
        

        <div id="game-section" style="display:none;">
            <div class="stats">
                <p>Hoş geldin, <span id="current-user"></span>!</p>
                <p><strong>Apex Bakiyesi:</strong> <span id="balance">0</span></p>
            </div>
            
            <button onclick="apexKazan()" style="background-color: #58a6ff;">Apex Kazan (+)</button>
            
            <hr>
            <h3>Ticaret Merkezi (Legal İşler)</h3>
            <div id="shop">
                <button onclick="esyaAl('Kurye Motoru', 50, 2)">Kurye Motoru (50 Apex) <br> <small>+2 Apex/Tık</small></button>
                <button onclick="esyaAl('Lojistik Kamyonu', 200, 10)">Lojistik Kamyonu (200 Apex) <br> <small>+10 Apex/Tık</small></button>
                <button onclick="esyaAl('Küçük Fabrika', 1000, 60)">Küçük Fabrika (1000 Apex) <br> <small>+60 Apex/Tık</small></button>
            </div>

            <button onclick="cikisYap()" style="background-color: #f85149; margin-top: 20px;">Çıkış Yap</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<div id="game-container">
    <div class="header">
        <h1>BİRHAT'IN MEKANI</h1>
        <p>Apex İmparatorluğu</p>
    </div>

    <div class="main-stats">
        <div class="stat-card">
            <span class="label">APEX</span>
            <span id="balance" class="value">0</span>
        </div>
        <div class="stat-card crystal">
            <span class="label">KRİSTAL</span>
            <span id="crystal" class="value">0</span>
        </div>
    </div>

    <div class="action-area">
        <button id="main-clicker" onclick="apexKazan()">
            <img src="https://api.dicebear.com/7.x/icons/svg?seed=coins" alt="Apex">
        </button>
    </div>

    <div class="shop-container">
        <h3>TİCARET & YATIRIM</h3>
        <div class="shop-grid">
            <button onclick="esyaAl('Kurye', 100, 5)">📦 Kurye Ağı (+5)</button>
            <button onclick="esyaAl('Borsa', 1000, 60)">📈 Borsa Ofisi (+60)</button>
            <button onclick="esyaAl('Yat', 10000, 500)">🚢 Lüks Yat (+500)</button>
        </div>
        <button class="convert-btn" onclick="kristalDonustur()">💎 10k Apex -> 1 Kristal</button>
    </div>

    <div class="chat-section">
        <div id="messages"></div>
        <div class="chat-input-group">
            <input type="text" id="chat-input" placeholder="Mesaj gönder...">
            <button onclick="mesajGonder()">🚀</button>
        </div>
    </div>
</div>
<div id="game-container">
    <div class="top-nav">
        <div class="user-info">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Birhat" class="mini-avatar">
            <span id="current-user">Oyuncu</span>
        </div>
        <div class="currency-bar">
            <span>Apex: <strong id="balance">0</strong></span>
            <span>Kristal: <strong id="crystal">0</strong></span>
        </div>
    </div>

    <div class="click-center">
        <div class="main-coin" onclick="apexKazan()">
            <img src="https://api.dicebear.com/7.x/icons/svg?seed=money" alt="Coin">
        </div>
    </div>

    <div class="business-tabs">
        <button onclick="tabDegistir('buildings')">🏙️ Binalar</button>
        <button onclick="tabDegistir('upgrades')">⚡ Geliştirmeler</button>
    </div>

    <div id="buildings" class="tab-content">
        <div class="item-card">
            <span>🚛 Lojistik Firması</span>
            <button onclick="esyaAl('Lojistik', 500, 25)">500 Apex (+25)</button>
        </div>
        <div class="item-card">
            <span>💻 Yazılım Şirketi</span>
            <button onclick="esyaAl('Yazılım', 2500, 150)">2500 Apex (+150)</button>
        </div>
    </div>

    <div class="global-chat">
        <div id="messages"></div>
        <div class="input-row">
            <input type="text" id="chat-input" placeholder="Mekanda konuş...">
            <button onclick="mesajGonder()">▶</button>
        </div>
    </div>
</div>
